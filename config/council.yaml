    - Yara
    - Zeno

model_providers:
  codex:
    enabled: false
    discover_models: false
    enabled_models:
    disabled_models:
    static_models:
      - gpt-5.5
      - gpt-5.4
      - gpt-5.4-mini
      - gpt-5.3-codex
      - gpt-5.2
    max_parameters: null
    allow_unknown_size_models: true
    project_local_home: ./.codex
    retries: 2
    retry_base_delay_seconds: 1.0
    options:
      reasoning_effort: medium
  ollama:
    enabled: true
    discover_models: false
    base_url: http://localhost:11434
    enabled_models:
    disabled_models:
    # default
    static_models:
      - deepseek-r1:7b
      - qwen3:4b
      - mistral:7b
      - gemma3:4b
      - llama3.2:3b
    # Smaller
    # static_models:
    #   - deepseek-r1:7b
    #   - qwen3:4b
    #   - mistral:7b
    #   - gemma3:1b
    #   - llama3.2:1b
    # Larger
    # static_models:
    #   - deepseek-r1:8b
    #   - qwen3:8b
    #   - mistral-nemo:12b
    #   - gemma3:12b
    #   - llama3.1:8b
    max_parameters: 8b
    allow_unknown_size_models: false
    request_timeout_seconds: 300
    options:
      temperature: 0.8
      seed: null

model_assignment:
  mode: random_on_creation
  persist_assignment: true
  prefer_unique_models: true
  allow_duplicates_when_needed: true

model_overrides:

secretary:
  mode: model
  provider: ollama
  model: qwen3:4b
  verbosity: balanced

search:
  enabled: true
  provider: searxng
  allowFallback: false
  fallbackProvider: searxng
  timeoutSeconds: 15
  maxResults: 8
  cacheTtlSeconds: 900
  minDelaySeconds: 3
  maxConcurrentRequests: 1
  searxng:
    baseUrl: http://localhost:8080
    defaultEngines:
      - bing
      - wikipedia
      - wikidata
      - github
      - stackoverflow
  ollama:
    baseUrl: https://ollama.com
    apiKeyEnv: OLLAMA_API_KEY
    apiKey: null
    searchEndpoint: /api/web_search
    fetchEndpoint: /api/web_fetch

personality_assignment:
  mode: random_on_creation
  persist_assignment: true
  prefer_unique_personalities: true

personality_pool:
  - friendly and enthusiastic
  - dry and skeptical
  - concise and analytical
  - playful and chaotic
  - practical and budget-conscious
  - refined and taste-focused
  - contrarian
  - cautious and risk-averse
  - blunt and direct
  - curious and exploratory
  - cinematic and dramatic
  - trend-chasing
  - old-school traditionalist
  - optimization obsessed
  - emotionally intuitive

storage:
  council_state_path: ./storage/council-state.json
  leaderboard_path: ./storage/leaderboard.json
  memories_path: ./storage/memories

runtime:
  sessions_path: ./runtime/sessions
  logs_path: ./runtime/logs
  temp_path: ./runtime/temp
