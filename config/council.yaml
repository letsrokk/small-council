council:
  min_members: 1
  discussion_rounds: 2
  runoff_rounds: 3
  diversity_mode: balanced
  member_names:
    - Aurelia
    - Bram
    - Cato
    - Dima
    - Echo
  generated_member_names:
    - Fenn
    - Gaia
    - Hale
